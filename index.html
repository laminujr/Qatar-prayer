<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qatar Prayer Times</title>
<meta name="theme-color" content="#C8102E">
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1544985363-7bb5c70df85f');
  background-size: cover;
  background-attachment: fixed;
  color: #fff;
  text-align: center;
}
h1 { 
  margin-top: 20px; 
  color: #C8102E;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}
.prayer-card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  margin: 10px 20px;
  padding: 15px;
  border-radius: 15px;
  border: 2px solid #C8102E;
}
.prayer-name { font-size: 20px; font-weight: bold; }
.prayer-time { font-size: 28px; color: #C8102E; font-weight: bold; }
button {
  padding: 10px 20px;
  font-size: 16px;
  background: #C8102E;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>
<body>
  <h1>🕌 Qatar Prayer Times</h1>
  <div id="prayers">Loading...</div>

<script>
fetch("https://api.aladhan.com/v1/timingsByCity?city=Doha&country=Qatar&method=8")
.then(res => res.json())
.then(data => {
  const times = data.data.timings;
  document.getElementById('prayers').innerHTML = 
    '<div class="prayer-card"><div class="prayer-name">Fajr</div><div class="prayer-time">' + times.Fajr + '</div></div>' +
    '<div class="prayer-card"><div class="prayer-name">Dhuhr</div><div class="prayer-time">' + times.Dhuhr + '</div></div>' +
    '<div class="prayer-card"><div class="prayer-name">Asr</div><div class="prayer-time">' + times.Asr + '</div></div>' +
    '<div class="prayer-card"><div class="prayer-name">Maghrib</div><div class="prayer-time">' + times.Maghrib + '</div></div>' +
    '<div class="prayer-card"><div class="prayer-name">Isha</div><div class="prayer-time">' + times.Isha + '</div></div>';
})
.catch(err => {
  document.getElementById('prayers').innerHTML = "Tap to refresh<br><button onclick='location.reload()'>🔄 Refresh</button>";
});
</script>
</body>
</html>
