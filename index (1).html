<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qatar Prayer Times</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      /* BACKGROUND IMAGE - CHANGE THIS LINK */
      background: url('https://images.unsplash.com/photo-1544985363-7bb5c70df85f') no-repeat center fixed;
      background-size: cover;
      color: white;
      padding: 30px 20px;
    }
    .overlay {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 15px;
      max-width: 600px;
      margin: auto;
    }
    h1 { color: #38bdf8; }
    .card {
      background: rgba(30, 41, 59, 0.9);
      padding: 15px;
      border-radius: 12px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Qatar Prayer Times</h1>
    
    <div class="card">
      <h2>Doha, Qatar</h2>
      <p>Fajr: 5:00 AM | Dhuhr: 12:00 PM</p>
      <p>Asr: 3:30 PM | Maghrib: 6:00 PM | Isha: 7:30 PM</p>
    </div>

    <div class="card">
      <h2>World Prayer Times</h2>
      <p><b>Makkah:</b> Fajr 5:10 AM</p>
      <p><b>Dubai:</b> Fajr 5:05 AM</p>
      <p><b>London:</b> Fajr 5:30 AM</p>
      <p><b>New York:</b> Fajr 5:45 AM</p>
    </div>
  </div>
</body>
</html>
